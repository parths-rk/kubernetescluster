apiVersion: apps/v1
kind: Deployment
metadata:
  name: firstdeployment
  labels:
    app: firstdeployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: firstdeployment

  template:
    metadata:
      labels:
        app: firstdeployment
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80

          volumeMounts:
            - name: nginx-html
              mountPath: /usr/share/nginx/html

      volumes:
        - name: nginx-html
          configMap:
            name: nginx-html
